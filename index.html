<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Raporty buildow League of Legends</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #121a2c;
      --text: #e8edf8;
      --muted: #aab6d4;
      --border: #2a3657;
      --accent: #7dd3fc;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Segoe UI, Tahoma, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(900px 500px at 15% -10%, #1c2a4a 0%, rgba(28,42,74,0) 60%), var(--bg);
      line-height: 1.5;
    }
    main {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 34px;
      line-height: 1.15;
    }
    p {
      margin: 0;
      color: var(--muted);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-top: 28px;
    }
    a.card {
      display: block;
      min-height: 150px;
      padding: 20px;
      color: inherit;
      text-decoration: none;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    a.card:hover,
    a.card:focus-visible {
      border-color: var(--accent);
      outline: none;
    }
    .name {
      display: block;
      margin-bottom: 8px;
      font-size: 24px;
      font-weight: 700;
    }
    .meta {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <h1>Raporty buildow</h1>
    <p>Wybierz raport HTML opublikowany na GitHub Pages.</p>
    <section class="grid" aria-label="Lista raportow">
      <a class="card" href="raport_xerath.html">
        <span class="name">Xerath</span>
        <span class="meta">Artillery mage, poke, burst AP i sloty sytuacyjne.</span>
      </a>
      <a class="card" href="raport_senna.html">
        <span class="name">Senna</span>
        <span class="meta">Support marksman, World Atlas, Bloodsong i AD utility build.</span>
      </a>
    </section>
  </main>
</body>
</html>
